server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # xlsx uploads from the LeadFlow loader.
    client_max_body_size 64m;
    client_body_timeout 120s;
    send_timeout 120s;

    # Hide dotfiles (except .well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets with cache headers — but fall through to PHP
    # if the file doesn't exist on disk (covers Livewire JS routes).
    location ~* \.(?:css|js|map|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        try_files $uri @php;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location @php {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 120s;
        include fastcgi_params;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 120s;
        include fastcgi_params;
    }
}