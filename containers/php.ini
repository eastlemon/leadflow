; LeadFlow PHP overrides — applied via /usr/local/etc/php/conf.d/zz-leadflow.ini
; inside the container. Tuned for Laravel + Filament + PhpSpreadsheet.

; ---- opcache (CLI + FPM) ----
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.fast_shutdown=1

; ---- uploads (xlsx files for the loader) ----
upload_max_filesize=64M
post_max_size=64M
memory_limit=512M
max_execution_time=120

; ---- locale ----
date.timezone=UTC

; ---- session ----
session.cookie_httponly=1
session.use_strict_mode=1

; ---- realpath cache (Laravel hits the FS a lot) ----
realpath_cache_size=4096K
realpath_cache_ttl=600
