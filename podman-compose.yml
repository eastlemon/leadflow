# LeadFlow dev stack — podman-compose.
#
# Brings up: MySQL 8, Redis 7, the php-fpm app, nginx, the horizon queue
# worker, and a scheduler loop. One command and you have the whole app.
#
# Quick start:
#   cp .env.docker .env                              # copy env template
#   podman-compose up -d --build                      # build & start everything
#   podman exec -it leadflow-app php artisan make:filament-user  # create admin
#   open http://localhost:8080/admin
#
# After code changes on the host (bind-mounted):
#   podman-compose restart app horizon scheduler     # pick up PHP changes
#   npm run build && podman-compose restart nginx     # pick up asset changes
#
# Full rebuild (after composer.json / Containerfile changes):
#   podman-compose down
#   podman-compose up -d --build
#
# Notes:
#   - Source code is bind-mounted so edits on the host are visible in
#     the container. vendor/ and public/build/ are NOT bind-mounted,
#     they come from the image build stages.
#   - storage/ and bootstrap/cache/ are bind-mounted from the host.
#   - userns_mode: keep-id maps the container's root UID to your host
#     UID, so files written by the container appear owned by you.
#   - :z on bind-mounts is the SELinux relabel flag (no-op on Ubuntu/Debian).

name: leadflow

services:
  mysql:
    image: docker.io/library/mysql:8.0
    container_name: leadflow-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT_MAP:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-leadflow}
      MYSQL_USER: ${DB_USERNAME:-leadflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-leadflow_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - 127.0.0.1
        - -uroot
        - -p${DB_ROOT_PASSWORD:-root_secret}
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks: [leadflow]

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: leadflow-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_MAP:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [leadflow]

  app:
    build:
      context: .
      dockerfile: containers/Containerfile
    image: leadflow-app:dev
    container_name: leadflow-app
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "true"
    volumes:
      - ./:/var/www/html:z
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    userns_mode: keep-id
    networks: [leadflow]

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    container_name: leadflow-nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./containers/nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      - ./public:/var/www/html/public:z
    depends_on:
      app: { condition: service_started }
    networks: [leadflow]

  horizon:
    image: leadflow-app:dev
    container_name: leadflow-horizon
    restart: unless-stopped
    env_file: .env
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./:/var/www/html:z
    depends_on:
      app: { condition: service_started }
    userns_mode: keep-id
    networks: [leadflow]

  scheduler:
    image: leadflow-app:dev
    container_name: leadflow-scheduler
    restart: unless-stopped
    env_file: .env
    command: ["scheduler-loop"]
    volumes:
      - ./:/var/www/html:z
    depends_on:
      app: { condition: service_started }
    userns_mode: keep-id
    networks: [leadflow]

volumes:
  mysql_data:

networks:
  leadflow:
    driver: bridge